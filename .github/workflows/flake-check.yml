name: flake-check

# Closes the loop the local Stop-gate defers: full multi-system evaluation.
# The host running Claude Code has no `nix`, so it validates syntax only and
# marks full evaluation "CI-deferred". This workflow IS that CI.
#
# ---------------------------------------------------------------------------
# REQUIRED-CHECK DESIGN — read before touching job names or branch protection.
# ---------------------------------------------------------------------------
# The heavy legs here (aarch64-darwin, x86_64-linux, aarch64-linux, lint) are
# skipped at JOB level on PRs that cannot affect the flake verdict — decided by
# the `changes` path-filter job below. A JOB-level `if:`-skipped required check
# reports SUCCESS to a PR; a WORKFLOW-level `paths:` skip leaves the required
# check *pending forever* and wedges the PR. So we gate at job level and expose
# a single always-run aggregate, `flake-check-result`, as the required check.
#
# BRANCH PROTECTION: the required status check MUST be `flake-check-result`,
# NOT the four legs. `flake-check-result` passes iff every needed leg is
# success OR skipped, and fails on any failure/cancelled — so a docs-only PR
# that skips the legs still reports a green required check and stays mergeable.
# (`Scan for secrets` / gitleaks remains a separate required check untouched.)
# ---------------------------------------------------------------------------

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: flake-check-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege GITHUB_TOKEN: this workflow only reads the checkout. Cachix
# push uses CACHIX_AUTH_TOKEN (a repo secret), not GITHUB_TOKEN.
permissions:
  contents: read

jobs:
  # Cheap gate: which verdict-affecting paths changed? Its `nix` output drives
  # the job-level `if:` on the heavy legs. The filter is INTENTIONALLY
  # over-inclusive (bias toward RUNNING) — a false negative would silently skip
  # a real regression, so we err on the side of a wasted run. On non-PR events
  # the legs ignore this and always run (see their `if:`), so this is a no-op
  # cost there (dorny/paths-filter reports all-true when there is no base ref).
  changes:
    name: changes
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      nix: ${{ steps.filter.outputs.nix }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            nix:
              - '**/*.nix'
              - 'flake.lock'
              - 'treefmt.nix'
              - '.pre-commit-config.*'
              - '.editorconfig'
              - '.gitignore'
              - '.github/workflows/flake-check.yml'

  # Evaluate every system natively where possible. aarch64-linux is realized
  # via emulation on the x86_64 runner so all three of the canonical triple
  # are covered without self-hosted ARM-Linux hardware.
  #
  # NOTE: `nix flake check --system <arch>` does NOT filter outputs by system —
  # `--system` sets the Nix evaluator's own host system (a config key), and is
  # silently ignored for untrusted users in CI. Each job instead evaluates the
  # system-specific top-level derivations directly via `nix eval` (which only
  # evaluates, never builds — the separate `nix build` steps populate the cache).
  #
  # Runs when a verdict-affecting path changed OR on any non-PR event
  # (push-to-main, workflow_dispatch) — never skipped off a PR.
  check:
    name: ${{ matrix.name }}
    needs: changes
    if: ${{ needs.changes.outputs.nix == 'true' || github.event_name != 'pull_request' }}
    runs-on: ${{ matrix.os }}
    # Cap so an emulated-aarch64 QEMU stall fails fast instead of hanging 6h.
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: aarch64-darwin
            os: macos-14            # Apple Silicon runner
            emulate: false
          - name: x86_64-linux
            os: ubuntu-24.04
            emulate: false
          - name: aarch64-linux
            os: ubuntu-24.04         # cross-eval via binfmt emulation
            emulate: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Enable aarch64 emulation
        if: matrix.emulate
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          platforms: arm64

      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            ${{ matrix.emulate && 'extra-platforms = aarch64-linux' || '' }}

      # Cachix: pull from + push to the public `ismailkattakath` cache. The
      # action installs a post-build hook, so every store path realized below
      # is pushed automatically. authToken is a write-only credential held only
      # as a repo secret; when absent (e.g. forks) push is skipped and the cache
      # is still used read-only — so this is safe to merge before the secret exists.
      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: ismailkattakath
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      # Git purity: flakes ignore untracked files. CI checks out a clean tree,
      # but assert it explicitly so a stray generated file fails loudly.
      - name: Assert git purity (no untracked .nix)
        run: |
          untracked=$(git ls-files --others --exclude-standard -- '*.nix')
          if [ -n "$untracked" ]; then
            echo "::error::Untracked .nix files break flake evaluation:"; echo "$untracked"; exit 1
          fi

      - name: Evaluate aarch64-darwin outputs
        if: matrix.name == 'aarch64-darwin'
        run: |
          # `nix eval` takes ONE installable, so loop. `.drvPath` forces the
          # derivation to evaluate without building it.
          for t in \
            .#darwinConfigurations.nixcon.config.system.build.toplevel \
            .#packages.aarch64-darwin.nixbox-vm \
            .#checks.aarch64-darwin.formatting \
            .#checks.aarch64-darwin.pre-commit \
            .#devShells.aarch64-darwin.default; do
            echo "::group::eval $t"
            nix eval --show-trace "$t.drvPath"
            echo "::endgroup::"
          done

      # Realize the devShell closure so the Cachix post-build hook pushes it —
      # this is exactly the closure the devcontainer's `cachix use` pulls.
      # Build the devShell (populate cache) AND the nixbox-vm launcher — the
      # writeShellApplication's shellcheck only runs at BUILD time, so `nix eval`
      # above does not exercise it; this build does.
      - name: Build devShell + nixbox-vm (populate cache; runs shellcheck)
        if: matrix.name == 'aarch64-darwin'
        run: |
          nix build --print-build-logs --no-link \
            .#devShells.aarch64-darwin.default \
            .#packages.aarch64-darwin.nixbox-vm

      - name: Evaluate x86_64-linux outputs
        if: matrix.name == 'x86_64-linux'
        run: |
          for t in \
            .#packages.x86_64-linux.dockerImage \
            .#packages.x86_64-linux.devcontainerImage \
            .#checks.x86_64-linux.formatting \
            .#checks.x86_64-linux.pre-commit \
            .#devShells.x86_64-linux.default; do
            echo "::group::eval $t"
            nix eval --show-trace "$t.drvPath"
            echo "::endgroup::"
          done

      - name: Build devShell (populate cache)
        if: matrix.name == 'x86_64-linux'
        run: nix build --print-build-logs --no-link .#devShells.x86_64-linux.default

      - name: Evaluate aarch64-linux outputs
        if: matrix.name == 'aarch64-linux'
        run: |
          for t in \
            .#nixosConfigurations.nixbox.config.system.build.toplevel \
            .#nixosConfigurations.nixrpi.config.system.build.toplevel \
            .#packages.aarch64-linux.dockerImage \
            .#packages.aarch64-linux.devcontainerImage \
            .#checks.aarch64-linux.formatting \
            .#checks.aarch64-linux.pre-commit \
            .#devShells.aarch64-linux.default; do
            echo "::group::eval $t"
            nix eval --show-trace "$t.drvPath"
            echo "::endgroup::"
          done

      # aarch64-linux is what the devcontainer runs — caching this emulated
      # closure once here is the highest-value push (saves the slow QEMU rebuild).
      - name: Build devShell (populate cache)
        if: matrix.name == 'aarch64-linux'
        run: nix build --print-build-logs --no-link .#devShells.aarch64-linux.default

  # Formatting + lint + pre-commit are all flake checks now (treefmt-nix +
  # git-hooks.nix), so CI builds the SAME derivations developers run via
  # `nix fmt` / the commit hook. No drifting ad-hoc tool invocations.
  #
  # Same gate as `check`: run on a verdict-affecting change OR any non-PR event.
  lint:
    name: "lint (treefmt: nixfmt / statix / deadnix + pre-commit)"
    needs: changes
    if: ${{ needs.changes.outputs.nix == 'true' || github.event_name != 'pull_request' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
        with:
          extra_nix_config: experimental-features = nix-command flakes
      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: ismailkattakath
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Formatting gate (fails on unformatted/lintable files)
        run: nix build --print-build-logs .#checks.x86_64-linux.formatting
      - name: Pre-commit hooks (sandboxed)
        run: nix build --print-build-logs .#checks.x86_64-linux.pre-commit

  # Aggregate required check. Exists so the heavy legs above can be SKIPPED on
  # verdict-irrelevant PRs without wedging branch protection: a job-level-skipped
  # required check reports pending forever, but THIS job always runs (if: always())
  # and reports one stable status. It passes iff every needed job is success OR
  # skipped, and fails on any failure/cancelled. Branch protection's required
  # status check MUST be this job (`flake-check-result`), not the four legs.
  flake-check-result:
    name: flake-check-result
    needs: [changes, check, lint]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Decide (all needed jobs green or skipped)
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
